<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画布</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --panel-bg: #ffffff;
            --border-color: #e2e8f0;
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --cell-size: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: #334155;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 56px;
            z-index: 10;
        }

        header h1 {
            font-size: 1.25rem;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 布局容器 */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 16px;
            overflow-y: auto;
            z-index: 5;
        }

        .sidebar-right {
            border-right: none;
            border-left: 1px solid var(--border-color);
            width: 300px;
        }

        /* 编辑器画布主视口 */
        .editor-viewport {
            flex: 1;
            position: relative;
            overflow: hidden; /* 裁剪滚动条，由JS控制平移 */
            background-color: #cbd5e1; /* 工作台背景色 */
            background-image: radial-gradient(#94a3b8 1px, transparent 1px);
            background-size: 20px 20px;
            cursor: grab;
        }

        .editor-viewport.active-drawing {
            cursor: crosshair;
        }

        .editor-viewport.active-grabbing {
            cursor: grabbing;
        }

        /* 用于平移与缩放的容器 */
        #canvas-transform-container {
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
            display: inline-block;
            padding: 100px;
        }

        /* 统一合并尺标与网格 */
        #pixel-grid {
            display: grid;
            background-color: #94a3b8;
            gap: 1px;
            user-select: none;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            background-size: cover;
            background-position: center;
            padding: 1px;
            background-color: #94a3b8;
        }

        /* 尺标单元格 */
        .ruler-cell {
            background-color: #f1f5f9;
            color: #64748b;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        /* 拼豆圆形单元格 */
        .cell {
            background-color: #ffffff;
            aspect-ratio: 1;
            cursor: pointer;
            transition: background-color 0.1s;
            border-radius: 50%;
            box-shadow: inset 0 0 1px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        /* 无网格线状态 */
        #pixel-grid.no-grid {
            gap: 0px;
            background-color: transparent;
        }
        #pixel-grid.no-grid .cell {
            border-radius: 0;
            box-shadow: none;
        }

        /* 当有背景底图时，未上色方块显示半透明，方便临摹 */
        #pixel-grid.has-bg .cell[data-color="#ffffff"] {
            background-color: rgba(255, 255, 255, 0.45) !important;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 10px;
            border-left: 3px solid var(--primary-color);
            padding-left: 8px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .row-inputs {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        label {
            font-size: 12px;
            font-weight: 500;
            color: #64748b;
        }

        input[type="number"] {
            width: 100%;
            padding: 6px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        /* 工具按钮组 */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        button {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: #fff;
            color: #334155;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        button:hover {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
        }

        button.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        button.primary-btn {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        button.primary-btn:hover {
            background-color: var(--primary-hover);
        }

        button.danger-btn {
            background-color: #ef4444;
            color: white;
            border-color: #ef4444;
        }

        button.danger-btn:hover {
            background-color: #dc2626;
        }

        /* 统一SVG矢量图样式，适应主题颜色 */
        button svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        /* 色板 */
        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input[type="color"] {
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 8px;
            cursor: pointer;
            background: none;
        }

        .palette-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            margin-top: 8px;
        }

        .palette-color {
            aspect-ratio: 1;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }

        .palette-color:hover {
            transform: scale(1.1);
        }

        .palette-color.active {
            box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--primary-color);
        }

        /* 统计 */
        .stats-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 240px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .stats-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 8px;
            background: #f8fafc;
            border-radius: 6px;
            font-size: 13px;
            border: 1px solid var(--border-color);
            cursor: pointer;
        }

        .stats-item:hover {
            background: #f1f5f9;
        }

        .stats-color-preview {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.15);
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }

        #bg-upload {
            display: none;
        }

        /* 状态条 */
        .status-bar {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background-color: rgba(15, 23, 42, 0.85);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            gap: 16px;
            pointer-events: none;
            backdrop-filter: blur(4px);
            align-items: center;
        }

        .status-bar span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-bar svg {
            width: 14px;
            height: 14px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>

    <header>
        <h1> 画布 </h1>
        <div style="display: flex; gap: 8px;">
            <button id="undo-btn" title="撤销">
                <svg viewBox="0 0 24 24"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
                撤销
            </button>
            <button id="redo-btn" title="重做">
                <svg viewBox="0 0 24 24"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg>
                重做
            </button>
            <button id="center-btn" title="视口居中重置">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                居中画布
            </button>
            <button id="export-btn" class="primary-btn">
                <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                导出图纸
            </button>
        </div>
    </header>

    <div class="main-container">
        <!-- 左侧工具栏 -->
        <div class="sidebar">
            <div class="section-title">画布设置</div>
            <div class="control-group">
                <div class="row-inputs">
                    <div>
                        <label>行数</label>
                        <input type="number" id="grid-rows" value="20" min="5" max="100">
                    </div>
                    <span style="align-self: flex-end; margin-bottom: 8px;">×</span>
                    <div>
                        <label>列数</label>
                        <input type="number" id="grid-cols" value="20" min="5" max="100">
                    </div>
                </div>
                <button id="resize-btn" class="primary-btn" style="width: 100%;">确认重置大小</button>
            </div>

            <div class="section-title">绘图工具</div>
            <div class="tools-grid">
                <button id="pencil-btn" class="tool-btn active">
                    <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                    画笔
                </button>
                <button id="eraser-btn" class="tool-btn">
                    <svg viewBox="0 0 24 24"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.5l12-12c1-1 2.5-1 3.5 0l4.3 4.3c1 1 1 2.5 0 3.5L10.5 21ZM17 22H7"/></svg>
                    擦除
                </button>
                <button id="picker-btn" class="tool-btn">
                    <svg viewBox="0 0 24 24"><path d="m15 11-8.5 8.5H3v-3.5L11.5 7.5Zm0 0 3.5-3.5L20 9l-3.5 3.5ZM6 16l1.5 1.5"/></svg>
                    取色
                </button>
                <button id="bucket-btn" class="tool-btn">
                    <svg viewBox="0 0 24 24">
                        <path d="m19 11-8-8-8.15 8.15a2 2 0 0 0-.05 2.77l5.3 5.3a2 2 0 0 0 2.83 0L19 11Z"/>
                        <path d="m5 17 3-3"/>
                        <path d="M12 3a9 9 0 0 1 9 9"/>
                    </svg>
                    填充
                </button>
                <button id="pan-btn" class="tool-btn" style="grid-column: span 2;">
                    <svg viewBox="0 0 24 24"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v5"/><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"/><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"/><path d="M6 14V11a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v9a9 9 0 0 0 9 9h1a8 8 0 0 0 8-8v-3a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v4"/></svg>
                    拖拽
                </button>
            </div>

            <div class="section-title">图片转图纸</div>
            <div class="control-group">
                <button id="convert-upload-trigger" style="width: 100%;">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    导入图片生成图纸
                </button>
                <input type="file" id="convert-upload" accept="image/*" style="display: none;">
                
                <div style="display: flex; align-items: center; margin-top: 4px;">
                    <label style="cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 11px;">
                        <input type="checkbox" id="convert-match-palette" checked style="cursor: pointer; width: auto;">
                        限制为经典色板颜色
                    </label>
                </div>
                <div style="font-size: 11px; color: #94a3b8; line-height: 1.4;">
                    提示：转换依据上方的“行数”和“列数”对图像进行采样，建议先调整好画布大小。
                </div>
            </div>

            <div class="section-title">辅助参考</div>
            <div class="control-group">
                <button id="grid-toggle-btn" style="width: 100%;">
                    <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    网格线
                </button>
                
                <label style="margin-top: 6px;">临摹底图</label>
                <button id="upload-trigger-btn" style="width: 100%;">
                    <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><polygon points="22 19 2 19 4 10 20 10 22 19"/></svg>
                    导入参考图片
                </button>
                <input type="file" id="bg-upload" accept="image/*">
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 4px;">
                    <label>底图透明度</label>
                    <span id="opacity-val" style="font-size: 11px;">0.5</span>
                </div>
                <input type="range" id="bg-opacity" min="0" max="1" step="0.1" value="0.5">
                <button id="bg-remove-btn" class="danger-btn" style="width: 100%; display: none;">移除参考图</button>
            </div>

            <button id="clear-btn" class="danger-btn" style="margin-top: auto;">
                <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                彻底清空
            </button>
        </div>

        <!-- 中间画布区域 -->
        <div class="editor-viewport" id="editor-viewport">
            <!-- 缩放和平移容器 -->
            <div id="canvas-transform-container">
                <div id="pixel-grid"></div>
            </div>

            <!-- 右下角缩放和坐标指示条 -->
            <div class="status-bar">
                <span id="zoom-text">缩放: 100%</span>
                <span>
                    <svg viewBox="0 0 24 24"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A5 5 0 0 0 8 8c0 1 .3 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><line x1="9" y1="18" x2="15" y2="18"/><line x1="10" y1="22" x2="14" y2="22"/></svg>
                    提示: 滚动滚轮可缩放画布，按住鼠标中键或使用抓手工具可拖动画布
                </span>
            </div>
        </div>

        <!-- 右侧颜色管理与统计 -->
        <div class="sidebar sidebar-right">
            <div class="section-title">画笔颜色</div>
            <div class="control-group">
                <div class="color-picker-wrapper">
                    <input type="color" id="color-picker" value="#ff0000">
                    <div>
                        <div id="color-hex" style="font-weight: bold; font-size: 14px;">#FF0000</div>
                        <div style="font-size: 11px; color:#64748b;">自定义颜色</div>
                    </div>
                </div>
                <div class="palette-grid" id="palette-grid">
                    <!-- 动态生成常用经典色板 -->
                </div>
            </div>

            <div class="section-title">统计</div>
            <div class="stats-list" id="stats-list">
                <!-- 动态填充 -->
            </div>
        </div>
    </div>

    <!-- 用于导出的隐藏 Canvas -->
    <canvas id="export-canvas" style="display: none;"></canvas>

    <script>
        const grid = document.getElementById('pixel-grid');
        const rowsInput = document.getElementById('grid-rows');
        const colsInput = document.getElementById('grid-cols');
        const colorPicker = document.getElementById('color-picker');
        const colorHexText = document.getElementById('color-hex');
        const resizeBtn = document.getElementById('resize-btn');
        const clearBtn = document.getElementById('clear-btn');
        const exportBtn = document.getElementById('export-btn');
        const gridToggleBtn = document.getElementById('grid-toggle-btn');
        const paletteGrid = document.getElementById('palette-grid');
        const statsList = document.getElementById('stats-list');
        
        // 工具按钮
        const pencilBtn = document.getElementById('pencil-btn');
        const eraserBtn = document.getElementById('eraser-btn');
        const pickerBtn = document.getElementById('picker-btn');
        const bucketBtn = document.getElementById('bucket-btn');
        const panBtn = document.getElementById('pan-btn');
        
        // 撤销重做与居中
        const undoBtn = document.getElementById('undo-btn');
        const redoBtn = document.getElementById('redo-btn');
        const centerBtn = document.getElementById('center-btn');

        // 参考底图
        const bgUpload = document.getElementById('bg-upload');
        const uploadTriggerBtn = document.getElementById('upload-trigger-btn');
        const bgOpacity = document.getElementById('bg-opacity');
        const opacityValText = document.getElementById('opacity-val');
        const bgRemoveBtn = document.getElementById('bg-remove-btn');

        // 图片转拼豆
        const convertUpload = document.getElementById('convert-upload');
        const convertUploadTrigger = document.getElementById('convert-upload-trigger');
        const convertMatchPalette = document.getElementById('convert-match-palette');

        // 平移与缩放变量
        const viewport = document.getElementById('editor-viewport');
        const transformContainer = document.getElementById('canvas-transform-container');
        const zoomText = document.getElementById('zoom-text');

        let isDrawing = false;
        let isPanning = false;
        let currentMode = 'pencil'; // pencil, eraser, picker, bucket, pan
        
        let scale = 1.0;
        let panX = 50;
        let panY = 50;
        let startX = 0, startY = 0;

        // 经典18色色板
        const classicColors = [
            '#000000', '#ffffff', '#7f7f7f', '#c3c3c3', '#880015', '#ed1c24',
            '#ff7f27', '#fff200', '#22b14c', '#00a2e8', '#3f48cc', '#a349a4',
            '#b97a57', '#ffaec9', '#ffca18', '#b5e61d', '#99d9ea', '#7092be'
        ];

        let history = [];
        let historyStep = -1;

        // 视图变换核心逻辑
        function updateTransform() {
            transformContainer.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
            zoomText.textContent = `缩放: ${Math.round(scale * 100)}%`;
        }

        // 居中画布到编辑区
        function centerCanvas() {
            const viewportRect = viewport.getBoundingClientRect();
            const gridRect = grid.getBoundingClientRect();
            
            const rows = parseInt(rowsInput.value);
            const cols = parseInt(colsInput.value);
            
            // 依据行数和列数计算网格所需的基本空间大小 (包含尺标)
            const approxW = (cols * 24) + 30;
            const approxH = (rows * 24) + 30;

            // 动态适配比例
            scale = Math.min((viewportRect.width - 120) / approxW, (viewportRect.height - 120) / approxH, 1.8);
            scale = Math.max(scale, 0.4);

            panX = (viewportRect.width - approxW * scale) / 2;
            panY = (viewportRect.height - approxH * scale) / 2;

            updateTransform();
        }

        // 初始化合并了尺标的 Grid
        function initGrid() {
            grid.innerHTML = '';
            const rows = parseInt(rowsInput.value);
            const cols = parseInt(colsInput.value);

            // Grid Template：第一行和第一列为 30px 的尺标轨道，其余分配给拼豆
            grid.style.gridTemplateColumns = `30px repeat(${cols}, var(--cell-size))`;
            grid.style.gridTemplateRows = `30px repeat(${rows}, var(--cell-size))`;

            // 1. (0, 0) 交叉点空白格
            const corner = document.createElement('div');
            corner.className = 'ruler-cell';
            grid.appendChild(corner);

            // 2. 填充顶部标尺：第一行的后几列
            for (let c = 1; c <= cols; c++) {
                const colHeader = document.createElement('div');
                colHeader.className = 'ruler-cell';
                colHeader.textContent = c;
                grid.appendChild(colHeader);
            }

            // 3. 填充主画板行列内容
            for (let r = 0; r < rows; r++) {
                // 每行第一列填充左侧标尺
                const rowHeader = document.createElement('div');
                rowHeader.className = 'ruler-cell';
                rowHeader.textContent = r + 1;
                grid.appendChild(rowHeader);

                // 生成本行的拼豆格单元
                for (let c = 0; c < cols; c++) {
                    const idx = r * cols + c;
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.color = '#ffffff'; // 初始颜色
                    cell.dataset.index = idx;

                    // 绑定事件
                    cell.addEventListener('mousedown', (e) => {
                        if (currentMode === 'pan' || e.button === 1) return; // 抓手模式或按下中键，则跳过涂色
                        e.preventDefault();
                        if (currentMode === 'picker') {
                            pickColor(cell);
                        } else if (currentMode === 'bucket') {
                            fillBucket(idx);
                        } else {
                            isDrawing = true;
                            colorCell(cell);
                        }
                    });

                    cell.addEventListener('mouseenter', () => {
                        if (isDrawing && (currentMode === 'pencil' || currentMode === 'eraser')) {
                            colorCell(cell);
                        }
                    });

                    grid.appendChild(cell);
                }
            }

            history = [];
            historyStep = -1;
            saveHistory();
            updateStats();
            setTimeout(centerCanvas, 50); // 延迟执行等待 DOM 尺寸就绪
        }

        // 视口内的平移与滚轮缩放事件
        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomFactor = 1.1;
            const prevScale = scale;

            if (e.deltaY < 0) {
                scale = Math.min(scale * zoomFactor, 8); // 最高放大8倍
            } else {
                scale = Math.max(scale / zoomFactor, 0.25); // 最低缩小至25%
            }

            // 以鼠标位置为缩放中心进行位移变换
            const rect = viewport.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            panX = mouseX - (mouseX - panX) * (scale / prevScale);
            panY = mouseY - (mouseY - panY) * (scale / prevScale);

            updateTransform();
        }, { passive: false });

        // 平移拖拽交互
        viewport.addEventListener('mousedown', (e) => {
            // 触发平移的条件：中键按下，或者处于「抓手」模式
            if (e.button === 1 || currentMode === 'pan') {
                isPanning = true;
                startX = e.clientX - panX;
                startY = e.clientY - panY;
                viewport.classList.add('active-grabbing');
                e.preventDefault();
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (isPanning) {
                panX = e.clientX - startX;
                panY = e.clientY - startY;
                updateTransform();
            }
        });

        window.addEventListener('mouseup', () => {
            if (isPanning) {
                isPanning = false;
                viewport.classList.remove('active-grabbing');
            }
            if (isDrawing) {
                isDrawing = false;
                saveHistory();
            }
        });

        // 兼容移动端双指缩放及单指拖拽平移
        viewport.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                isPanning = true;
                const touch1 = e.touches[0];
                const touch2 = e.touches[1];
                startX = (touch1.clientX + touch2.clientX) / 2 - panX;
                startY = (touch1.clientY + touch2.clientY) / 2 - panY;
            } else if (currentMode === 'pan') {
                isPanning = true;
                startX = e.touches[0].clientX - panX;
                startY = e.touches[0].clientY - panY;
            }
        });

        viewport.addEventListener('touchmove', (e) => {
            if (isPanning) {
                e.preventDefault();
                if (e.touches.length === 2) {
                    const touch1 = e.touches[0];
                    const touch2 = e.touches[1];
                    panX = (touch1.clientX + touch2.clientX) / 2 - startX;
                    panY = (touch1.clientY + touch2.clientY) / 2 - startY;
                } else {
                    panX = e.touches[0].clientX - startX;
                    panY = e.touches[0].clientY - startY;
                }
                updateTransform();
            }
        });

        viewport.addEventListener('touchend', () => {
            isPanning = false;
        });

        // 辅助颜色解析函数
        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b };
        }

        function rgbToHex(r, g, b) {
            return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toLowerCase();
        }

        // 查找经典色板中最接近的颜色 (欧几里得距离)
        function findNearestClassicColor(r, g, b, rgbList) {
            let minDistance = Infinity;
            let nearestHex = '#ffffff';
            for (let i = 0; i < classicColors.length; i++) {
                const cRgb = rgbList[i];
                const dist = Math.pow(r - cRgb.r, 2) + Math.pow(g - cRgb.g, 2) + Math.pow(b - cRgb.b, 2);
                if (dist < minDistance) {
                    minDistance = dist;
                    nearestHex = classicColors[i];
                }
            }
            return nearestHex;
        }

        // 核心图片转拼豆逻辑
        function convertImageToBeads(img) {
            const rows = parseInt(rowsInput.value);
            const cols = parseInt(colsInput.value);

            // 创建离屏 canvas 用于降采样
            const offCanvas = document.createElement('canvas');
            offCanvas.width = cols;
            offCanvas.height = rows;
            const offCtx = offCanvas.getContext('2d');

            // 强制将图片拉伸绘制到行列数对应的尺寸
            offCtx.drawImage(img, 0, 0, cols, rows);

            // 获取每个像素点的 RGBA 数据
            const imgData = offCtx.getImageData(0, 0, cols, rows);
            const data = imgData.data;

            const cells = document.querySelectorAll('.cell');
            const classicRgbList = classicColors.map(hexToRgb);

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const pixelIndex = (r * cols + c) * 4;
                    const red = data[pixelIndex];
                    const green = data[pixelIndex + 1];
                    const blue = data[pixelIndex + 2];
                    const alpha = data[pixelIndex + 3];

                    const cellIndex = r * cols + c;
                    const cell = cells[cellIndex];
                    if (!cell) continue;

                    let finalColor = '#ffffff';

                    // 忽略高透明度像素
                    if (alpha >= 128) {
                        if (convertMatchPalette.checked) {
                            finalColor = findNearestClassicColor(red, green, blue, classicRgbList);
                        } else {
                            finalColor = rgbToHex(red, green, blue);
                        }
                    }

                    cell.style.backgroundColor = finalColor;
                    cell.dataset.color = finalColor;
                }
            }

            saveHistory();
            updateStats();
        }

        // 涂色/擦除逻辑
        function colorCell(cell) {
            let color = '#ffffff';
            if (currentMode === 'pencil') {
                color = colorPicker.value;
            }
            if (cell.dataset.color !== color) {
                cell.style.backgroundColor = color;
                cell.dataset.color = color;
                updateStats();
            }
        }

        // 拾色吸管
        function pickColor(cell) {
            const pickedColor = cell.dataset.color;
            colorPicker.value = pickedColor;
            updateColorHex();
            setActivePaletteHighlight(pickedColor);
            switchTool('pencil');
        }

        // 区域填充 (Flood Fill)
        function fillBucket(startIndex) {
            const rows = parseInt(rowsInput.value);
            const cols = parseInt(colsInput.value);
            const cells = document.querySelectorAll('.cell');
            const targetColor = cells[startIndex].dataset.color;
            const replacementColor = colorPicker.value;

            if (targetColor.toLowerCase() === replacementColor.toLowerCase()) return;

            const queue = [startIndex];
            const visited = new Set();
            visited.add(startIndex);

            while (queue.length > 0) {
                const curr = queue.shift();
                const r = Math.floor(curr / cols);
                const c = curr % cols;

                cells[curr].style.backgroundColor = replacementColor;
                cells[curr].dataset.color = replacementColor;

                const directions = [
                    { r: r - 1, c: c },
                    { r: r + 1, c: c },
                    { r: r, c: c - 1 },
                    { r: r, c: c + 1 }
                ];

                for (let d of directions) {
                    if (d.r >= 0 && d.r < rows && d.c >= 0 && d.c < cols) {
                        const nextIdx = d.r * cols + d.c;
                        if (!visited.has(nextIdx) && cells[nextIdx].dataset.color === targetColor) {
                            visited.add(nextIdx);
                            queue.push(nextIdx);
                        }
                    }
                }
            }
            saveHistory();
            updateStats();
        }

        // 历史记录撤销重做
        function saveHistory() {
            const cells = document.querySelectorAll('.cell');
            const state = Array.from(cells).map(c => c.dataset.color);
            
            if (historyStep < history.length - 1) {
                history = history.slice(0, historyStep + 1);
            }
            
            history.push(state);
            if (history.length > 50) {
                history.shift();
            }
            historyStep = history.length - 1;
            updateHistoryButtons();
        }

        function undo() {
            if (historyStep > 0) {
                historyStep--;
                restoreState(history[historyStep]);
            }
        }

        function redo() {
            if (historyStep < history.length - 1) {
                historyStep++;
                restoreState(history[historyStep]);
            }
        }

        function restoreState(state) {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, idx) => {
                cell.style.backgroundColor = state[idx];
                cell.dataset.color = state[idx];
            });
            updateStats();
            updateHistoryButtons();
        }

        function updateHistoryButtons() {
            undoBtn.disabled = historyStep <= 0;
            redoBtn.disabled = historyStep >= history.length - 1;
            undoBtn.style.opacity = undoBtn.disabled ? 0.5 : 1;
            redoBtn.style.opacity = redoBtn.disabled ? 0.5 : 1;
        }

        undoBtn.addEventListener('click', undo);
        redoBtn.addEventListener('click', redo);
        centerBtn.addEventListener('click', centerCanvas);

        // 工具切换机制
        function switchTool(mode) {
            currentMode = mode;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            
            viewport.classList.remove('active-drawing');
            if (mode === 'pencil') {
                pencilBtn.classList.add('active');
                viewport.classList.add('active-drawing');
            } else if (mode === 'eraser') {
                eraserBtn.classList.add('active');
                viewport.classList.add('active-drawing');
            } else if (mode === 'picker') {
                pickerBtn.classList.add('active');
            } else if (mode === 'bucket') {
                bucketBtn.classList.add('active');
            } else if (mode === 'pan') {
                panBtn.classList.add('active');
            }
        }

        pencilBtn.addEventListener('click', () => switchTool('pencil'));
        eraserBtn.addEventListener('click', () => switchTool('eraser'));
        pickerBtn.addEventListener('click', () => switchTool('picker'));
        bucketBtn.addEventListener('click', () => switchTool('bucket'));
        panBtn.addEventListener('click', () => switchTool('pan'));

        // 开关网格线
        function toggleGrid() {
            grid.classList.toggle('no-grid');
            gridToggleBtn.classList.toggle('active', !grid.classList.contains('no-grid'));
        }
        gridToggleBtn.addEventListener('click', toggleGrid);

        // 颜色与预设色板
        function initPalette() {
            paletteGrid.innerHTML = '';
            classicColors.forEach(color => {
                const item = document.createElement('div');
                item.className = 'palette-color';
                item.style.backgroundColor = color;
                item.dataset.color = color;
                
                if (color.toLowerCase() === colorPicker.value.toLowerCase()) {
                    item.classList.add('active');
                }

                item.addEventListener('click', () => {
                    colorPicker.value = color;
                    updateColorHex();
                    setActivePaletteHighlight(color);
                    switchTool('pencil');
                });
                paletteGrid.appendChild(item);
            });
        }

        function setActivePaletteHighlight(activeColor) {
            document.querySelectorAll('.palette-color').forEach(item => {
                if (item.dataset.color.toLowerCase() === activeColor.toLowerCase()) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        function updateColorHex() {
            colorHexText.textContent = colorPicker.value.toUpperCase();
        }

        colorPicker.addEventListener('input', () => {
            updateColorHex();
            setActivePaletteHighlight(colorPicker.value);
            switchTool('pencil');
        });

        // 统计用量
        function updateStats() {
            const cells = document.querySelectorAll('.cell');
            const counts = {};

            cells.forEach(cell => {
                const color = cell.dataset.color.toLowerCase();
                if (color !== '#ffffff') { // 忽略空底色
                    counts[color] = (counts[color] || 0) + 1;
                }
            });

            statsList.innerHTML = '';
            const sortedColors = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);

            if (sortedColors.length === 0) {
                statsList.innerHTML = '<div style="color: #94a3b8; font-size: 13px; text-align: center; padding: 10px;">尚未开始拼豆</div>';
                return;
            }

            sortedColors.forEach(color => {
                const item = document.createElement('div');
                item.className = 'stats-item';
                item.title = "点击可将画笔设为该颜色";
                
                const formattedColor = color.toUpperCase();
                item.innerHTML = `
                    <div>
                        <span class="stats-color-preview" style="background-color: ${color};"></span>
                        <span>${formattedColor}</span>
                    </div>
                    <span class="stats-count">${counts[color]} 颗</span>
                `;

                item.addEventListener('click', () => {
                    colorPicker.value = color;
                    updateColorHex();
                    setActivePaletteHighlight(color);
                    switchTool('pencil');
                });

                statsList.appendChild(item);
            });
        }

        // 底图参考相关事件
        uploadTriggerBtn.addEventListener('click', () => bgUpload.click());
        bgUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    grid.style.backgroundImage = `url(${event.target.result})`;
                    grid.classList.add('has-bg');
                    bgRemoveBtn.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        bgRemoveBtn.addEventListener('click', () => {
            grid.style.backgroundImage = '';
            grid.classList.remove('has-bg');
            bgUpload.value = '';
            bgRemoveBtn.style.display = 'none';
        });

        bgOpacity.addEventListener('input', (e) => {
            const val = e.target.value;
            opacityValText.textContent = val;
            grid.style.opacity = val;
        });

        // 图片转拼豆相关事件
        convertUploadTrigger.addEventListener('click', () => convertUpload.click());
        convertUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                if (confirm('转换图片将覆盖当前画布内容，确定继续吗？')) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            convertImageToBeads(img);
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
                convertUpload.value = ''; // 重置 input 允许重复上传相同文件
            }
        });

        clearBtn.addEventListener('click', () => {
            if (confirm('确认清空画布吗？此操作不可逆。')) {
                document.querySelectorAll('.cell').forEach(cell => {
                    cell.style.backgroundColor = '#ffffff';
                    cell.dataset.color = '#ffffff';
                });
                saveHistory();
                updateStats();
            }
        });

        resizeBtn.addEventListener('click', () => {
            if (confirm('改变画布大小将重置所有内容，确认继续吗？')) {
                initGrid();
            }
        });

        // 键盘全局热键
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'z' || e.key === 'Z') {
                    e.preventDefault();
                    undo();
                } else if (e.key === 'y' || e.key === 'Y') {
                    e.preventDefault();
                    redo();
                }
            }
            if (e.key === 'p' || e.key === 'P') switchTool('pencil');
            if (e.key === 'e' || e.key === 'E') switchTool('eraser');
            if (e.key === 'i' || e.key === 'I') switchTool('picker');
            if (e.key === 'g' || e.key === 'G') toggleGrid();
            if (e.key === 'h' || e.key === 'H') switchTool('pan');
        });

        // --- 核心导出逻辑 ---
        exportBtn.addEventListener('click', () => {
            const rows = parseInt(rowsInput.value);
            const cols = parseInt(colsInput.value);
            
            const exportCanvas = document.getElementById('export-canvas');
            const ctx = exportCanvas.getContext('2d');

            const exportCellSize = 32; 
            const lineWidth = 2;       
            const rulerOffset = 40; 

            exportCanvas.width = cols * exportCellSize + (cols + 1) * lineWidth + rulerOffset;
            exportCanvas.height = rows * exportCellSize + (rows + 1) * lineWidth + rulerOffset;

            // 画布背景底色
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

            // 绘制标尺数字
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            for (let c = 0; c < cols; c++) {
                const x = rulerOffset + lineWidth + c * (exportCellSize + lineWidth) + (exportCellSize / 2);
                ctx.fillStyle = '#64748b';
                ctx.fillText((c + 1).toString(), x, rulerOffset / 2);
            }

            for (let r = 0; r < rows; r++) {
                const y = rulerOffset + lineWidth + r * (exportCellSize + lineWidth) + (exportCellSize / 2);
                ctx.fillStyle = '#64748b';
                ctx.fillText((r + 1).toString(), rulerOffset / 2, y);
            }

            // 绘制网格背景色
            ctx.fillStyle = '#cbd5e1';
            ctx.fillRect(rulerOffset, rulerOffset, exportCanvas.width - rulerOffset, exportCanvas.height - rulerOffset);

            // 只获取真正的画笔格子进行物理渲染，不受尺标格的影响
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, index) => {
                const r = Math.floor(index / cols);
                const c = index % cols;

                const x = rulerOffset + lineWidth + c * (exportCellSize + lineWidth);
                const y = rulerOffset + lineWidth + r * (exportCellSize + lineWidth);

                const beadColor = cell.dataset.color || '#ffffff';

                ctx.fillStyle = beadColor;
                
                // 绘制圆形拼豆颗粒
                ctx.beginPath();
                const radius = exportCellSize / 2;
                ctx.arc(x + radius, y + radius, radius - 1, 0, 2 * Math.PI);
                ctx.fill();

                // 拼豆中空凹陷孔阴影效果
                ctx.beginPath();
                ctx.arc(x + radius, y + radius, 2.5, 0, 2 * Math.PI);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                ctx.fill();
            });

            const link = document.createElement('a');
            link.download = `image_${cols}x${rows}.png`;
            link.href = exportCanvas.toDataURL('image/png');
            link.click();
        });

        // 启动执行
        initPalette();
        updateColorHex();
        initGrid();
        switchTool('pencil');
    </script>
</body>
</html>
